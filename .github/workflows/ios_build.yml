name: iOS Build (Free Backup)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Simulator
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: |
          cd customer_app
          flutter pub get

      - name: Install Pods
        run: |
          cd customer_app/ios
          pod install

      - name: Build iOS Simulator
        run: |
          cd customer_app
          flutter build ios --simulator --debug --no-codesign

      - name: Zip .app for Preview
        run: |
          mkdir build_output
          cp -R customer_app/build/ios/iphonesimulator/Runner.app build_output/
          cd build_output
          zip -r UnivFoods_iOS.zip Runner.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build_output/UnivFoods_iOS.zip
